<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ringer Toggle — Loop</title>
  <link rel="stylesheet" href="style-tester.css" />
</head>
<body>

  <button id="ringer" class="ringer" aria-pressed="false" aria-label="Toggle ringer">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
      <!-- Bell (must have class="bell") -->
      <path class="bell"
        d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2Zm6-6V11a6 6 0 1 0-12 0v5l-2 2v1h16v-1l-2-2Z" />
      <!-- Two-layer slash -->
      <path class="slash-back"  d="M1 4 L23 20" pathLength="100" />
      <path class="slash-front" d="M1 4 L23 20" pathLength="100" />
    </svg>
  </button>

  <script src="tester.js"></script>
</body>
</html>
